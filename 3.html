<!DOCTYPE html>
<html lang="ar" dir="rtl" style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم كرم الشام</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            background-image: url('back.png');
            background-size: cover;
            background-position: center;

        }

        h1 {
            text-align: center;
            color: #4a4a4a;
        }

        h2 {
            margin-top: 40px;
            color: #4a4a4a;
            border-bottom: 2px solid #8b7355;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category {
            margin-top: 30px;
        }

        .category-note {
            text-align: center;
            color: #8b4513;
            font-size: 1.1em;
            margin: 15px 0;
            padding: 12px 20px;
            background: linear-gradient(135deg, #fff8dc, #fff4e6);
            border: 2px dashed #d4a574;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(139, 115, 85, 0.2);
            position: relative;
            overflow: hidden;
        }

        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Special styling for مقبلات category */
        .appetizers-category .item-list {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .appetizers-category .item {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b35 100%);
            border: none;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .appetizers-category .item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
            opacity: 0;
        }

        .appetizers-category .item:hover::before {
            animation: shimmer 0.6s ease-in-out;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
                opacity: 0;
            }
        }

        .appetizers-category .item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.4);
            background: linear-gradient(135deg, #ff6b35 0%, #ff9a56 100%);
        }

        .appetizers-category .item-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.5px;
        }

        .appetizers-category .single-price {
            margin-top: 12px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            border: none;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .appetizers-category .single-price:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .appetizers-category .single-price .price-amount {
            font-size: 1.4em;
            color: #ff6b35;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* Price badge animation */
        .appetizers-category .single-price::after {
            content: 'ج.م';
            font-size: 0.7em;
            color: #ff9a56;
            margin-right: 4px;
            font-weight: 600;
        }

        /* Night mode for مقبلات */
        body.night-mode .appetizers-category .item {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        body.night-mode .appetizers-category .item:hover {
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        body.night-mode .appetizers-category .item-title {
            color: #f7fafc;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        body.night-mode .appetizers-category .single-price {

        body.night-mode .appetizers-category .single-price:hover {

        }

            color: #fbbf24;

        body.night-mode .appetizers-category .single-price::after {
            color: #f59e0b;
        }

            flex-direction: column;
            justify-content: space-between;
        }

        .item.multi-price {

        }

        .item.multi-price:hover {

        }

        .item.single-price:hover {
            box-shadow: 0 2px 6px rgba(139, 115, 85, 0.15);
        }

        .item-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 12px;
            color: #5a4a3a;
        }

        .item-title-with-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 12px;
            color: #5a4a3a;
            padding-right: 10px;
            padding-left: 10px;
        }

        .item-title-with-price .inline-price {
            color: #8b7355;
            font-size: 1.2em;
            margin-right: 10px;
        }

        .item-content {
            font-size: 0.9em;

            padding: 4px;
        }

        .item.single-price .item-content {

        }

        }

        .price-table,

            display: block;

        .item.show-ingredients .price-table,

        .price-table {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            align-items: center;
            justify-content: center;
        }

        .price-row {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #f5f0e6;
            border-radius: 6px;
            border: none;
        }

        .price-row:last-child {
            border-bottom: none;
        }

        .price-size {
            font-size: 0.9em;
            color: #6b5b4a;
        }

        .price-amount {
            font-size: 1em;
            color: #8b7355;
            font-weight: bold;
        }

        .single-price {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e6dcc0;
            text-align: center;
            padding: 12px 0;
        }

        .single-price .price-amount {
            font-size: 1.3em;
            color: #8b7355;
            font-weight: bold;
        }

        .search-container {
            text-align: center;
        }

        #searchInput {
            padding: 12px;
            width: 60%;
            font-size: 1em;
            border-radius: 8px;
            border: 2px solid #d4c4a0;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #8b7355;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #f5f0e6;
            border: 2px solid #d4c4a0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: #8b7355;
            color: white;
            border-color: #8b7355;
        }

        .filter-btn.active {
            background: #8b7355;
            color: white;
            border-color: #8b7355;
        }

        .search-info {
            color: #6b5b4a;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .search-controls {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .clear-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            color: #a09080;
            display: none;
        }

        .clear-btn:hover {
            color: #8b7355;
        }

        .category-count {
            background: #8b7355;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: normal;
        }

        .category.hidden {
            display: none;
        }

        .highlight {
            background-color: #fff0b3;
            padding: 2px 4px;
            border-radius: 3px;
        }

        #menuContainer {
            min-height: 200px;
        }

        .loading {

            padding: 40px;

        }

        body.night-mode .item-title,

        body.night-mode .item-title-with-price .inline-price,

        body.night-mode .single-price {

        }

        body.night-mode #searchInput {
            background-color: #3a3a3a;
            border: 2px solid #555;

        }

        body.night-mode #searchInput:focus {
            border-color: #8b7355;
        }

        body.night-mode .filter-btn {
            background: #3a3a3a;
            border: 2px solid #555;
            color: #e6e6e6;
        }

        body.night-mode .filter-btn:hover,
        body.night-mode .filter-btn.active {
            background: #8b7355;

            border-color: #8b7355;
        }

        body.night-mode .search-info {

        }

        body.night-mode .clear-btn {
            color: #b8b8b8;
        }

        body.night-mode .clear-btn:hover {
            color: #8b7355;
        }

        body.night-mode .category-count {
            background: #8b7355;
            color: white;
        }

        body.night-mode .highlight {
            background-color: #5a4a3a;

        }

        body.night-mode .loading {

        }

        /* Night Mode Toggle Button */
        .mode-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #8b7355;
            color: white;
            border: none;
            border-radius: 50%;

            height: 35px;
            cursor: pointer;
            font-size: 14px;

        }

        .mode-toggle:hover {

        body.night-mode .mode-toggle {

        }

            background: #8b7355;
        }

        @keyframes fadeIn {
            from {

        // Night Mode Toggle Functionality
        const modeToggle = document.getElementById('modeToggle');
        const body = document.body;

        // Check for saved mode preference or default to light mode
        const currentMode = localStorage.getItem('nightMode') || 'light';
        if (currentMode === 'night') {
            body.classList.add('night-mode');
            modeToggle.textContent = '☀️';
        }

        modeToggle.addEventListener('click', function() {
            body.classList.toggle('night-mode');
            
            if (body.classList.contains('night-mode')) {
                modeToggle.textContent = '☀️';
                localStorage.setItem('nightMode', 'night');
            } else {
                modeToggle.textContent = '🌙';
                localStorage.setItem('nightMode', 'light');
            }
        });

        // Supabase Configuration
        const URL="https://yaibldleykxkytzlswvf.supabase.co/rest/v1/"
        const KEY="sb_publishable_Qp8M8CyNuVVRQBGuhKI8zw_8pZc0Ujp"

        let allCategories = []
        let allItems = []
        let allPrices = []
        let currentFilter = 'all'

        async function api(path, method="GET", body=null){
            try{
                const res = await fetch(URL+path,{
                    method: method,
                    headers: {
                        apikey: KEY,
                        Authorization: "Bearer "+KEY,
                        "Content-Type": "application/json"
                    },
                    body: body ? JSON.stringify(body) : null
                })

                if(!res.ok){
                    throw new Error(`HTTP error! status: ${res.status}`)
                }

                const text = await res.text()
                return text ? JSON.parse(text) : {}
            } catch(error){
                console.error('API Error:', error)
                return null
            }
        }

        async function loadMenuData(){
            try{
                const [categoriesData, itemsData, pricesData] = await Promise.all([
                    api("categories?order=id"),
                    api("items?order=id"),
                    api("item_prices?order=id")
                ])

                if(!categoriesData || !itemsData || !pricesData){
                    throw new Error('Failed to load menu data')
                }

                allCategories = categoriesData
                allItems = itemsData
                allPrices = pricesData

                initializeMenu()
            } catch(error){
                console.error('Error loading menu:', error)
                document.getElementById('menuContainer').innerHTML = `
                <div class="loading">
                    <h3>Unable to load menu</h3>
                    <p>Please try again later</p>
                </div>
                `
            }
        }
            function initializeMenu() {
            // Generate filter buttons
            const filterButtons = document.getElementById('filterButtons');
            filterButtons.innerHTML = '<button class="filter-btn active" data-category="all">الكل</button>';

            allCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.category = category.name;
                btn.textContent = category.name;
                filterButtons.appendChild(btn);
            });

            // Generate menu HTML
            const menuContainer = document.getElementById('menuContainer');
            menuContainer.innerHTML = '';

            allCategories.forEach(category => {
                const categoryItems = allItems.filter(item => item.category_id === category.id)
                if(categoryItems.length === 0) return

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                if (category.name === 'مقبلات') {
                    categoryDiv.className += ' appetizers-category';
                }
                categoryDiv.dataset.category = category.name;

                const categoryHeader = document.createElement('h2');
                categoryHeader.innerHTML = `
                ${category.name}
                <span class="category-count">${categoryItems.length}</span>
                `;
                categoryDiv.appendChild(categoryHeader);

                const itemList = document.createElement('div');
                itemList.className = 'item-list';

                categoryItems.forEach(item => {
                    const itemPrices = allPrices.filter(price => price.item_id === item.id)
                    const ingredients = item.ingredients || 'No ingredients listed'

                    const itemDiv = document.createElement('div');

                    const isSinglePrice = itemPrices.length === 1;
                    itemDiv.className = isSinglePrice ? 'item single-price' : 'item multi-price';

                    if (isSinglePrice) {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'item-title-with-price';
                        titleDiv.innerHTML = `
                        <span>${item.title}</span>
                        <span class="inline-price">${itemPrices[0].price} ج</span>
                        `;
                        itemDiv.appendChild(titleDiv);
                    } else {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'item-title';
                        titleDiv.textContent = item.title;
                        itemDiv.appendChild(titleDiv);
                    }

                    if (!isSinglePrice) {
                        const priceTable = document.createElement('div');
                        priceTable.className = 'price-table';
                        itemPrices.forEach(price => {
                            const priceRow = document.createElement('div');
                            priceRow.className = 'price-row';
                            priceRow.innerHTML = `
                            <span class="price-size">${price.size || ''}</span>
                            <span class="price-amount">${price.price} ج</span>
                            `;
                            priceTable.appendChild(priceRow);
                        });
                        itemDiv.appendChild(priceTable);
                    }

                    // Ingredients
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'item-content';
                    contentDiv.textContent = ingredients;
                    itemDiv.appendChild(contentDiv);

                    if (!isSinglePrice) {
                        itemDiv.addEventListener('click', function (e) {
                            this.classList.toggle('show-ingredients');
                        });
                    }

                    itemList.appendChild(itemDiv);
                });

                categoryDiv.appendChild(itemList);
                menuContainer.appendChild(categoryDiv);
            });

            // Setup event listeners
            setupEventListeners();
            performSearch('');
        }

        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const filterBtns = document.querySelectorAll('.filter-btn');

            // Search input
            searchInput.addEventListener('input', function () {
                const query = this.value.toLowerCase().trim();
                clearBtn.style.display = query ? 'block' : 'none';
                performSearch(query);
            });

            // Clear search
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                performSearch('');
            });

            // Filter buttons
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.category;
                    performSearch(searchInput.value.toLowerCase().trim());
                });
            });
        }

window.addEventListener("load", function () {
    setTimeout(function () {
        const loader = document.querySelector(".logo-loader");
        loader.classList.add("fade-out");

        setTimeout(() => {
            loader.style.display = "none";
        }, 500); // matches the CSS transition time
    }, 2000); // 4 seconds
});

        function performSearch(query) {
            const items = document.querySelectorAll('.item');
            const categories = document.querySelectorAll('.category');
            const searchInfo = document.getElementById('searchInfo');

            let visibleItems = 0;
            let visibleCategories = 0;

            categories.forEach(category => {
                const categoryName = category.dataset.category;
                const categoryItems = category.querySelectorAll('.item');
                let categoryVisibleItems = 0;

                const showCategory = currentFilter === 'all' || currentFilter === categoryName;

                if (showCategory) {
                    categoryItems.forEach(item => {
                        const titleElement = item.querySelector('.item-title') || item.querySelector('.item-title-with-price');
                        const contentElement = item.querySelector('.item-content');

                        const title = titleElement ? titleElement.textContent.toLowerCase() : '';
                        const content = contentElement ? contentElement.textContent.toLowerCase() : '';

                        if (!query || title.includes(query) || content.includes(query)) {
                            item.style.display = 'block';
                            categoryVisibleItems++;
                            visibleItems++;
                        } else {
                            item.style.display = 'none';
                        }
                    });

                    if (categoryVisibleItems > 0) {
                        category.classList.remove('hidden');
                        visibleCategories++;
                    } else {
                        category.classList.add('hidden');
                    }
                } else {
                    category.classList.add('hidden');
                    categoryItems.forEach(item => item.style.display = 'none');
                }
            });

            updateSearchInfo(query, visibleItems, visibleCategories);
        }

        function updateSearchInfo(query, visibleItems, visibleCategories) {
            const searchInfo = document.getElementById('searchInfo');
            let message = '';

            if (query) {
                message = `تم العثور على ${visibleItems} صنف`;
                if (currentFilter !== 'all') {
                    message += ` في فئة ${currentFilter}`;
                }
            } else if (currentFilter !== 'all') {
                message = `عرض فئة ${currentFilter}`;
            } else {
                message = '';
            }

            searchInfo.textContent = message;
        }
    </script>
